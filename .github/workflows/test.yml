name: Test

on:
  workflow_call:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: |
          go build -o /dev/null .
          go build -o /dev/null ./cmd/migrate
          go build -o /dev/null ./cmd/healthcheck

      - name: Run tests
        run: go test -v -race ./...
