name: Publish OCIR Image

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to OCIR
        uses: docker/login-action@v4
        with:
          registry: kix.ocir.io
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: kix.ocir.io/axkvg5nxhc7t/senryu:latest
