name: Test

on:
  workflow_call:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o /tmp/findsenryu .
          /tmp/findsenryu help

      - name: Run tests
        run: go test -v -race ./...

      - name: Run deadcode
        env:
          CGO_ENABLED: "0"
        run: go run golang.org/x/tools/cmd/deadcode@v0.45.0 -test ./...
