services:
  migrate:
    image: kix.ocir.io/axkvg5nxhc7t/senryu:latest
    entrypoint: ["/app/migrate"]
    secrets:
      - findsenryu-discord-token
      - findsenryu-discord-playing
      - findsenryu-discord-welcome-enabled
      - findsenryu-database-dsn
      - findsenryu-log-level
      - findsenryu-log-format
      - findsenryu-admin-owner-ids
      - findsenryu-admin-guild-id
      - findsenryu-admin-log-channel-id
      - findsenryu-admin-report-channel-id
      - findsenryu-admin-contact-channel-id
      - findsenryu-server-enabled
      - findsenryu-server-port
  app:
    image: kix.ocir.io/axkvg5nxhc7t/senryu:latest
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "9090:9090"
    secrets:
      - findsenryu-discord-token
      - findsenryu-discord-playing
      - findsenryu-discord-welcome-enabled
      - findsenryu-database-dsn
      - findsenryu-log-level
      - findsenryu-log-format
      - findsenryu-admin-owner-ids
      - findsenryu-admin-guild-id
      - findsenryu-admin-log-channel-id
      - findsenryu-admin-report-channel-id
      - findsenryu-admin-contact-channel-id
      - findsenryu-server-enabled
      - findsenryu-server-port
    # healthcheck disabled — distroless has no shell/curl
    # Use Docker restart policy for recovery
    stop_grace_period: 30s

secrets:
  findsenryu-discord-token:
    external: true
  findsenryu-discord-playing:
    external: true
  findsenryu-discord-welcome-enabled:
    external: true
  findsenryu-database-dsn:
    external: true
  findsenryu-log-level:
    external: true
  findsenryu-log-format:
    external: true
  findsenryu-admin-owner-ids:
    external: true
  findsenryu-admin-guild-id:
    external: true
  findsenryu-admin-log-channel-id:
    external: true
  findsenryu-admin-report-channel-id:
    external: true
  findsenryu-admin-contact-channel-id:
    external: true
  findsenryu-server-enabled:
    external: true
  findsenryu-server-port:
    external: true
