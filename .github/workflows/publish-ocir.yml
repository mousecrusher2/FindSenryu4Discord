name: Publish OCIR Image

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Login to OCIR
        uses: docker/login-action@v4
        with:
          registry: kix.ocir.io
          username: axkvg5nxhc7t/${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: kix.ocir.io/axkvg5nxhc7t/senryu:latest
          cache-from: type=gha,scope=findsenryu4discord
          cache-to: type=gha,mode=max,scope=findsenryu4discord

      - name: Cache OCI CLI
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ runner.arch }}-oci-cli-${{ hashFiles('.github/requirements/oci-cli.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-oci-cli-

      - name: Install OCI CLI
        shell: bash
        run: |
          set -euo pipefail

          venv="$RUNNER_TEMP/oci-cli-venv"

          python -m venv --upgrade-deps "$venv"
          "$venv/bin/python" -m pip install --disable-pip-version-check -r .github/requirements/oci-cli.txt

          echo "$venv/bin" >> "$GITHUB_PATH"

      - name: Delete old OCIR images
        env:
          OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
        run: |
          set -euo pipefail

          mapfile -t image_ids < <(
            oci artifacts container image list \
              --compartment-id "$OCI_CLI_TENANCY" \
              --repository-name senryu \
              --lifecycle-state AVAILABLE \
              --sort-by TIMECREATED \
              --sort-order DESC \
              --all \
              --query 'data[5:].id' |
              jq -r '.[]'
          )

          for image_id in "${image_ids[@]}"; do
            oci artifacts container image delete \
              --image-id "$image_id" \
              --force
          done
